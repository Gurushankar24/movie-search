<label>Search the movie</label>
<input type="text" [(ngModel)]="searchedMovie" >

<button (click)="Onsearch()">Search</button>

@if(this.apiMoviesList()){
<div>
 
        <p>{{movieCount()}}</p>
</div>
}


@for(item of apiMoviesList(); track $index){
<div  (click)="onClick(item)">
    Title : {{item.Title}}
    Year : {{item.Year}}
    Type : {{item.Type}}

    <div >
        <img [src]='item.Poster'>
    </div>

</div>
}
