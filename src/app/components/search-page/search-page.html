<div class="search-header">
  <input type="text" [(ngModel)]="searchedMovie" placeholder="Search movies...">
  <button (click)="Onsearch()">Search</button>
  @if(apiMoviesList().length > 0) {
    <span>Found: {{ movieCount() }} results</span>
  }
</div>

<div class="movie-grid">
  @for(item of apiMoviesList(); track $index) {
    <div class="movie-card" (click)="onClick(item)">
      <div class="poster-container">
        <img [src]="item.Poster !== 'N/A' ? item.Poster : 'assets/placeholder.png'">
      </div>
      <div class="movie-info">
        <h3>{{ item.Title }}</h3>
        <p>{{ item.Year }} • {{ item.Type }}</p>
      </div>
    </div>
  }
</div>
